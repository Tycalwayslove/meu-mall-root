name: meu-mall-test

services:
  server:
    build:
      context: ..
      dockerfile: deploy/docker/server.Dockerfile
    image: meu-mall/server:test
    restart: unless-stopped
    environment:
      DATABASE_PATH: /app/data/meumall-config.sqlite
    volumes:
      - ../runtime/server-data:/app/data
    ports:
      - "127.0.0.1:4100:4100"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:4100/api/health', timeout=3)\nPY"
        ]
      interval: 10s
      timeout: 5s
      retries: 6

  h5:
    build:
      context: ..
      dockerfile: deploy/docker/h5.Dockerfile
      args:
        H5_BASE_PATH: ""
        H5_VERSION: ${H5_VERSION:-local}
        H5_RELEASE_LABEL: ${H5_RELEASE_LABEL:-local}
        NEXT_PUBLIC_CONFIG_API_BASE_URL: /
        NEXT_PUBLIC_H5_MANIFEST_URL: /api/h5/manifest/active?environment=prod
        H5_MANIFEST_URL: http://server:4100/api/h5/manifest/active?environment=prod
    image: meu-mall/h5:test
    restart: unless-stopped
    environment:
      PORT: 3109
      HOSTNAME: 0.0.0.0
      H5_VERSION: ${H5_VERSION:-local}
      H5_RELEASE_LABEL: ${H5_RELEASE_LABEL:-local}
      H5_RELEASE_VARIANT: ${H5_RELEASE_VARIANT:-green}
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "127.0.0.1:3109:3109"

  admin:
    build:
      context: ..
      dockerfile: deploy/docker/admin.Dockerfile
      args:
        VITE_CONFIG_API_BASE_URL: /
        VITE_BASE_PATH: /admin/
    image: meu-mall/admin:test
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "127.0.0.1:5173:80"
